name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the bug clearly. Include steps to reproduce,
        expected vs actual behavior, and any relevant logs.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What went wrong?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Run `curl vany.sh/reality | sudo bash`
        2. Add user with `vany add reality testuser`
        3. See error in output...

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste any relevant logs, error messages, or screenshots.
      render: shell

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      options:
        - Docker containers
        - Install scripts (scripts/protocols/)
        - Worker TUI (workers/src/tui/)
        - CLI (cli/vany.sh)
        - Cloak desktop client
        - CI/CD workflows
        - Documentation
        - Other
