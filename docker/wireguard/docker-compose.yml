services:
  wireguard:
    build: .
    image: vany-wireguard:latest
    container_name: vany-wireguard
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - /opt/vany/wg:/config:rw
      - /lib/modules:/lib/modules:ro
    environment:
      - PUID=0
      - PGID=0
      - TZ=UTC
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
